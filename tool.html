<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sparrow Food Solutions — SEO Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;padding:2rem}
.wrap{max-width:720px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.logo{width:44px;height:44px;background:#e8f0fe;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
h1{font-size:19px;font-weight:600}.sub{font-size:12px;color:#4caf50}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:1.2rem;margin-bottom:1rem}
label{font-size:12px;color:#666;font-weight:500;display:block;margin-bottom:5px}
input,textarea{width:100%;padding:8px 11px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
input:focus,textarea:focus{border-color:#4285f4}
textarea{resize:vertical;line-height:1.6}
.row{display:flex;gap:8px}.row input{flex:1}
.field{margin-bottom:.9rem}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none}
.blue{background:#4285f4;color:#fff}.blue:hover{background:#3574e2}.blue:disabled{opacity:.5;cursor:not-allowed}
.green{background:#4caf50;color:#fff}.green:hover{background:#43a047}.green:disabled{opacity:.5;cursor:not-allowed}
.gray{background:#fff;color:#333;border:1px solid #ddd}.gray:hover{background:#f5f5f5}
.acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.msg{font-size:13px;margin-top:7px;min-height:16px}
.ok{color:#4caf50}.er{color:#ef4444}.in{color:#666}
.plist{margin-top:10px}
.pi{padding:10px 13px;border-radius:8px;border:1px solid #e5e5e5;background:#fff;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.pi:hover{background:#f9f9f9;border-color:#4285f4}
.pn{font-size:14px;font-weight:500}.ps{font-size:12px;color:#888;margin-top:2px}
.pc{background:#f5f5f5;border-radius:8px;padding:10px 13px;margin-bottom:.9rem}
.vtag{display:inline-block;background:#e8f0fe;color:#1a73e8;font-size:11px;padding:2px 8px;border-radius:20px;margin:2px}
.tabs{display:flex;border-bottom:1px solid #e5e5e5;margin-bottom:.9rem}
.tab{padding:7px 15px;font-size:13px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:#666}
.tab.on{color:#111;border-bottom-color:#4285f4;font-weight:500}
.hr{border:none;border-top:1px solid #e5e5e5;margin:.9rem 0}
.ok-banner{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:9px 13px;font-size:13px;color:#2e7d32;margin-top:10px;display:none}
.spin{display:inline-block;width:11px;height:11px;border:2px solid #ddd;border-top-color:#4285f4;border-radius:50%;animation:sp .8s linear infinite;margin-right:5px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.preview{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:1rem;margin-top:.5rem;font-size:13px;line-height:1.7;max-height:300px;overflow-y:auto}
.preview h2{font-size:15px;margin-bottom:.5rem}
.preview h3{font-size:13px;margin:.8rem 0 .3rem}
.preview table{width:100%;border-collapse:collapse;font-size:12px}
.preview td{padding:4px 8px;border:1px solid #e5e5e5}
.preview tr:nth-child(even) td{background:#f9f9f9}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr"><div class="logo">🐦</div><div><h1>Sparrow Food Solutions — SEO Tool</h1><div class="sub">Connected to BigCommerce · Rich descriptions · Variants auto-detected</div></div></div>
<div class="card" id="S">
<label>Search by product name or SKU</label>
<div class="row"><input type="text" id="si" placeholder="e.g. CR-3032, fryer, cake pan..."/><button class="btn blue" id="sb">Search</button></div>
<div class="msg in" id="sm"></div>
<div class="plist" id="pl"></div>
</div>
<div id="E" style="display:none">
<div class="card">
<div class="tabs">
<button class="tab on" id="tab-c">Description</button>
<button class="tab" id="tab-p">Preview</button>
<button class="tab" id="tab-s">SEO &amp; metadata</button>
</div>
<div id="pi"></div>
<div id="TC"><div class="field"><label>Product description (HTML)</label><textarea id="fd" rows="10"></textarea></div></div>
<div id="TP" style="display:none"><label>Preview</label><div class="preview" id="preview"></div></div>
<div id="TS" style="display:none">
<div class="field"><label>Page title <span id="ct" style="font-size:11px;color:#999"></span></label><input type="text" id="ft"/></div>
<div class="field"><label>Meta description <span id="cm" style="font-size:11px;color:#999"></span></label><textarea id="fm" rows="3"></textarea></div>
<div class="field"><label>Search keywords <span style="font-size:11px;color:#888">(broad | long-tail)</span></label><textarea id="fk" rows="3"></textarea></div>
</div>
<div class="hr"></div>
<div class="acts">
<button class="btn blue" id="gb">Generate with AI</button>
<button class="btn green" id="svb">Save to BigCommerce</button>
<button class="btn gray" id="bb">Back</button>
</div>
<div class="msg" id="am"></div>
<div class="ok-banner" id="ob">Saved to BigCommerce!</div>
</div>
</div>
</div>
<script>
var PR='https://sparrow-seo-proxy.onrender.com';
var cp=null,cv=[],cs={};

document.getElementById('sb').onclick=function(){
  var q=document.getElementById('si').value.trim();
  if(!q)return;
  var sm=document.getElementById('sm'),pl=document.getElementById('pl');
  sm.innerHTML='<span class="spin"></span>Searching...';sm.className='msg in';pl.innerHTML='';
  document.getElementById('sb').disabled=true;
  fetch(PR+'/products?keyword='+encodeURIComponent(q))
    .then(function(r){return r.json();})
    .then(function(d){
      var ps=d.data||[];
      if(!ps.length){sm.textContent='No products found.';sm.className='msg er';}
      else{
        sm.textContent='Found '+ps.length+' product'+(ps.length>1?'s':'')+' — click to edit';sm.className='msg ok';
        ps.forEach(function(p){
          var div=document.createElement('div');div.className='pi';
          div.innerHTML='<div><div class="pn">'+p.name+'</div><div class="ps">SKU: '+(p.sku||'N/A')+'</div></div><span style="font-size:12px;color:#888">Edit</span>';
          div.onclick=function(){loadProduct(p);};
          pl.appendChild(div);
        });
      }
      document.getElementById('sb').disabled=false;
    })
    .catch(function(e){sm.textContent='Error: '+e.message;sm.className='msg er';document.getElementById('sb').disabled=false;});
};

document.getElementById('si').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('sb').click();});

function loadProduct(p){
  cp=p;cv=[];cs={weight:p.weight,width:p.width,depth:p.depth,height:p.height};
  document.getElementById('S').style.display='none';document.getElementById('E').style.display='block';
  document.getElementById('fd').value=(p.description||'').replace(/<[^>]*>/g,'').trim();
  document.getElementById('ft').value=p.page_title||'';
  document.getElementById('fm').value=p.meta_description||'';
  document.getElementById('fk').value=p.search_keywords||'';
  updateCount('ft','ct',60);updateCount('fm','cm',160);
  document.getElementById('ob').style.display='none';document.getElementById('am').textContent='';
  showTab('c');
  document.getElementById('pi').innerHTML='<div class="pc"><div class="pn">'+p.name+'</div><div class="ps">SKU: '+(p.sku||'N/A')+' | ID: '+p.id+'</div><div id="vtags" style="margin-top:6px"><span class="spin"></span> Loading variants...</div></div>';
  fetch(PR+'/products/'+p.id+'/variants')
    .then(function(r){return r.json();})
    .then(function(d){
      var variants=d.data||[];
      var vtags=document.getElementById('vtags');
      if(variants.length<=1){vtags.innerHTML='<span style="font-size:12px;color:#888">Single product</span>';}
      else{
        var labels=[];
        variants.forEach(function(v){
          if(v.option_values&&v.option_values.length>0){
            var label=v.option_values.map(function(o){return o.label;}).join(' / ');
            labels.push(label);cv.push(label);
          }
        });
        vtags.innerHTML=labels.map(function(l){return '<span class="vtag">'+l+'</span>';}).join('');
      }
    })
    .catch(function(){document.getElementById('vtags').innerHTML='<span style="font-size:12px;color:#888">Could not load variants</span>';});
}
  document.getElementById('tab-c').onclick=function(){showTab('c');};
document.getElementById('tab-p').onclick=function(){showTab('p');};
document.getElementById('tab-s').onclick=function(){showTab('s');};

function showTab(t){
  document.getElementById('TC').style.display=t==='c'?'block':'none';
  document.getElementById('TP').style.display=t==='p'?'block':'none';
  document.getElementById('TS').style.display=t==='s'?'block':'none';
  if(t==='p')document.getElementById('preview').innerHTML=document.getElementById('fd').value||'<p style="color:#888">Generate content first.</p>';
  document.getElementById('tab-c').className='tab'+(t==='c'?' on':'');
  document.getElementById('tab-p').className='tab'+(t==='p'?' on':'');
  document.getElementById('tab-s').className='tab'+(t==='s'?' on':'');
}

document.getElementById('ft').oninput=function(){updateCount('ft','ct',60);};
document.getElementById('fm').oninput=function(){updateCount('fm','cm',160);};

function updateCount(fid,cid,limit){
  var n=document.getElementById(fid).value.length;
  var el=document.getElementById(cid);
  el.textContent=n+'/'+limit;
  el.style.color=n>limit?'#ef4444':n>limit*0.9?'#f59e0b':'#999';
}

document.getElementById('gb').onclick=function(){
  if(!cp)return;
  var gb=document.getElementById('gb'),am=document.getElementById('am');
  gb.disabled=true;am.innerHTML='<span class="spin"></span>Generating rich SEO content...';am.className='msg in';
  document.getElementById('ob').style.display='none';
  fetch(PR+'/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product:cp.name,sku:cp.sku||'N/A',variants:cv,specs:cs})})
    .then(function(r){return r.json();})
    .then(function(d){
      var text=(d.content||[]).map(function(b){return b.text||'';}).join('').replace(/```json|```/g,'').trim();
      var g=JSON.parse(text);
      document.getElementById('fd').value=g.description||'';
      document.getElementById('ft').value=g.page_title||'';
      document.getElementById('fm').value=g.meta_description||'';
      document.getElementById('fk').value=g.search_keywords||'';
      updateCount('ft','ct',60);updateCount('fm','cm',160);
      am.textContent='Done! Click Preview to review or Save to push to BigCommerce.';am.className='msg ok';
      showTab('c');gb.disabled=false;
    })
    .catch(function(e){am.textContent='Failed: '+e.message;am.className='msg er';gb.disabled=false;});
};

document.getElementById('svb').onclick=function(){
  if(!cp)return;
  var svb=document.getElementById('svb'),am=document.getElementById('am');
  svb.disabled=true;am.innerHTML='<span class="spin"></span>Saving...';am.className='msg in';
  fetch(PR+'/products/'+cp.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({description:document.getElementById('fd').value,page_title:document.getElementById('ft').value,meta_description:document.getElementById('fm').value,search_keywords:document.getElementById('fk').value})})
    .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
    .then(function(res){
      if(!res.ok)throw new Error(res.d.title||JSON.stringify(res.d.errors));
      document.getElementById('ob').style.display='block';am.textContent='';svb.disabled=false;
    })
    .catch(function(e){am.textContent='Save failed: '+e.message;am.className='msg er';svb.disabled=false;});
};

document.getElementById('bb').onclick=function(){
  cp=null;cv=[];cs={};
  document.getElementById('E').style.display='none';document.getElementById('S').style.display='block';
  document.getElementById('pl').innerHTML='';document.getElementById('sm').textContent='';
};
</script>
</body>
</html>
